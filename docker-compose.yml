services:

  node-agent:
    build:
      context: .
      dockerfile: node_agent/Dockerfile
    restart: unless-stopped
    ports:
      - "8765:8765"
    env_file: .env
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import socket; s=socket.socket(); s.settimeout(4); s.connect(('localhost',8765)); s.close()"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        tag: "node-agent"
